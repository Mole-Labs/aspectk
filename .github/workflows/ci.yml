name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Check code formatting
        run: ./gradlew spotlessCheck

      - name: Run aspectk-core tests
        run: ./gradlew :aspectk-core:test

      - name: Run aspectk-core-tests (JVM)
        run: ./gradlew :aspectk-core-tests:jvmTest

      - name: Publish to Maven Local (required by sample)
        run: ./gradlew publishToMavenLocal

      - name: Run sample tests (JVM)
        run: ./gradlew -p sample :composeApp:jvmTest

name: CI

on:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Check code formatting
        run: ./gradlew spotlessCheck

      - name: Check binary API compatibility
        run: ./gradlew apiCheck

      - name: Run aspectk-core tests
        run: ./gradlew :aspectk-core:test

      - name: Run aspectk-core-tests (JVM)
        run: ./gradlew :aspectk-core-tests:jvmTest

      - name: Run aspectk-core-tests (JS)
        run: ./gradlew kotlinUpgradeYarnLock :aspectk-core-tests:jsTest

      - name: Run aspectk-core-tests (WasmJs)
        run: ./gradlew :aspectk-core-tests:wasmJsTest

      - name: Run aspectk-core-tests (all supported Kotlin versions)
        run: ./gradlew :aspectk-core-tests:testAllSupportedVersions

  test-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run aspectk-core-tests (iOS Simulator)
        run: ./gradlew :aspectk-core-tests:iosSimulatorArm64Test
